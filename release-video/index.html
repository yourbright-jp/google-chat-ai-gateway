<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Chat AI Gateway Image Movie</title>
  </head>
  <body>
    <div
      data-composition-id="google-chat-ai-gateway-reply-demo"
      data-width="1920"
      data-height="1080"
      data-duration="16"
    >
      <main class="stage">
        <div class="ambient ambient-one" data-layout-ignore></div>
        <div class="ambient ambient-two" data-layout-ignore></div>
        <div class="grid" data-layout-ignore></div>

        <section class="scene scene-hero">
          <img
            class="source-image hero-image"
            src="image/google-chat-ai-gateway-hero.png"
            alt="Google Chat AI Gateway"
          />
          <div class="pop pop-one">ポン</div>
          <div class="pop pop-two">ポポン</div>
          <div class="spark spark-a"></div>
          <div class="spark spark-b"></div>
        </section>

        <section class="scene scene-teams">
          <img
            class="source-image teams-image"
            src="image/google-chat-ai-gateway-built-for-teams.png"
            alt="Built for real teams"
          />
          <div class="caption-card caption-teams">
            <span>Chatで受けて</span>
            <strong>AIがすぐ返す</strong>
          </div>
        </section>

        <section class="scene scene-flow">
          <img
            class="source-image flow-image"
            src="image/google-chat-ai-gateway-how-it-works.png"
            alt="How it works"
          />
          <div class="flow-highlight highlight-one"></div>
          <div class="flow-highlight highlight-two"></div>
          <div class="flow-label">MESSAGE / APP_COMMAND</div>
        </section>

        <section class="scene scene-close">
          <div class="close-panel">
            <p class="eyebrow">Now Released</p>
            <h1>Google Chat AI Gateway</h1>
            <p>Google Chat上で、AIの返事がポポンと返る体験へ。</p>
            <div class="status-row">
              <span>Google Chat native</span>
              <span>Webhook / Hermes API</span>
              <span>Cloud Run ready</span>
            </div>
          </div>
        </section>

        <footer class="brand-footer">
          <img src="assets/yourbright-footer-logo.png" alt="YourBright" />
          <span>Google Chat AI Gateway release</span>
        </footer>
      </main>

      <style>
        [data-composition-id="google-chat-ai-gateway-reply-demo"] {
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          background: #f6fbfe;
          color: #173144;
          font-family: "Noto Sans JP", "Inter", "Segoe UI", sans-serif;
        }

        * {
          box-sizing: border-box;
        }

        .stage {
          position: relative;
          width: 100%;
          height: 100%;
          overflow: hidden;
          background:
            linear-gradient(135deg, rgba(255, 255, 255, 0.97), rgba(232, 248, 253, 0.94)),
            #f6fbfe;
        }

        .grid {
          position: absolute;
          inset: 0;
          opacity: 0.18;
          background-image:
            linear-gradient(rgba(15, 155, 228, 0.13) 1px, transparent 1px),
            linear-gradient(90deg, rgba(35, 162, 177, 0.12) 1px, transparent 1px);
          background-size: 80px 80px;
        }

        .ambient {
          position: absolute;
          border-radius: 999px;
          filter: blur(10px);
          opacity: 0.5;
        }

        .ambient-one {
          width: 720px;
          height: 720px;
          right: -180px;
          top: -190px;
          background: radial-gradient(circle, rgba(52, 168, 83, 0.24), rgba(52, 168, 83, 0));
        }

        .ambient-two {
          width: 820px;
          height: 820px;
          left: -260px;
          bottom: -290px;
          background: radial-gradient(circle, rgba(26, 115, 232, 0.2), rgba(26, 115, 232, 0));
        }

        .scene {
          position: absolute;
          inset: 0;
          z-index: 2;
          overflow: hidden;
        }

        .source-image {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 1920px;
          height: 1080px;
          object-fit: cover;
          transform: translate(-50%, -50%);
          filter: drop-shadow(0 26px 70px rgba(23, 49, 68, 0.1));
        }

        .scene-hero .source-image {
          transform-origin: 72% 46%;
        }

        .scene-teams .source-image {
          transform-origin: 72% 48%;
        }

        .scene-flow .source-image {
          transform-origin: 48% 42%;
        }

        .pop {
          position: absolute;
          z-index: 4;
          padding: 18px 26px;
          border-radius: 999px;
          color: #fff;
          font-size: 34px;
          font-weight: 900;
          box-shadow: 0 16px 42px rgba(26, 115, 232, 0.22);
          opacity: 0;
        }

        .pop-one {
          right: 318px;
          top: 490px;
          background: #1a73e8;
        }

        .pop-two {
          right: 210px;
          top: 660px;
          background: linear-gradient(135deg, #23a2b1, #34a853);
        }

        .spark {
          position: absolute;
          z-index: 3;
          width: 126px;
          height: 126px;
          border-radius: 999px;
          border: 6px solid rgba(26, 115, 232, 0.28);
          opacity: 0;
        }

        .spark-a {
          right: 298px;
          top: 408px;
        }

        .spark-b {
          right: 210px;
          top: 598px;
          border-color: rgba(52, 168, 83, 0.28);
        }

        .caption-card {
          position: absolute;
          left: 108px;
          bottom: 190px;
          z-index: 4;
          width: 520px;
          padding: 24px 30px;
          border-radius: 28px;
          background: rgba(255, 255, 255, 0.88);
          border: 1px solid rgba(35, 162, 177, 0.16);
          box-shadow: 0 20px 60px rgba(23, 49, 68, 0.13);
        }

        .caption-card span {
          display: block;
          color: #607482;
          font-size: 28px;
          font-weight: 800;
        }

        .caption-card strong {
          display: block;
          margin-top: 8px;
          color: #0f9be4;
          font-size: 46px;
          line-height: 1.15;
          font-weight: 900;
        }

        .flow-highlight {
          position: absolute;
          z-index: 4;
          width: 150px;
          height: 150px;
          border-radius: 999px;
          border: 8px solid rgba(52, 168, 83, 0.36);
          box-shadow: 0 0 0 16px rgba(52, 168, 83, 0.08);
          opacity: 0;
        }

        .highlight-one {
          left: 850px;
          top: 316px;
        }

        .highlight-two {
          left: 1215px;
          top: 316px;
          border-color: rgba(26, 115, 232, 0.34);
          box-shadow: 0 0 0 16px rgba(26, 115, 232, 0.08);
        }

        .flow-label {
          position: absolute;
          left: 310px;
          top: 408px;
          z-index: 4;
          padding: 18px 24px;
          border-radius: 999px;
          background: #fff;
          color: #1a73e8;
          font-family: "Poppins", "Inter", "Segoe UI", sans-serif;
          font-size: 26px;
          font-weight: 900;
          box-shadow: 0 14px 42px rgba(23, 49, 68, 0.12);
          opacity: 0;
        }

        .close-panel {
          position: absolute;
          left: 155px;
          right: 155px;
          top: 164px;
          bottom: 160px;
          z-index: 4;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 78px;
          border-radius: 42px;
          background: rgba(255, 255, 255, 0.9);
          border: 1px solid rgba(35, 162, 177, 0.16);
          box-shadow: 0 28px 90px rgba(23, 49, 68, 0.14);
        }

        .eyebrow {
          margin: 0;
          color: #23a2b1;
          font-family: "Poppins", "Inter", "Segoe UI", sans-serif;
          font-size: 30px;
          font-weight: 900;
          letter-spacing: 0;
          text-transform: uppercase;
        }

        h1,
        p {
          letter-spacing: 0;
        }

        .close-panel h1 {
          margin: 18px 0 0;
          color: #173144;
          font-size: 102px;
          line-height: 1.05;
          font-weight: 900;
        }

        .close-panel p {
          margin: 26px 0 0;
          color: #607482;
          font-size: 38px;
          line-height: 1.45;
          font-weight: 650;
        }

        .status-row {
          display: flex;
          gap: 20px;
          margin-top: 56px;
        }

        .status-row span {
          padding: 18px 26px;
          border-radius: 999px;
          background: #eef8fb;
          color: #0f9be4;
          font-size: 25px;
          font-weight: 900;
        }

        .brand-footer {
          position: absolute;
          left: 88px;
          right: 88px;
          bottom: 44px;
          z-index: 8;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding-top: 22px;
          border-top: 1px solid rgba(23, 49, 68, 0.1);
        }

        .brand-footer img {
          width: 240px;
          height: auto;
          display: block;
        }

        .brand-footer span {
          color: #607482;
          font-size: 22px;
          font-weight: 750;
        }
      </style>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const duration = 16;

        gsap.set(".scene", { opacity: 0, pointerEvents: "none" });
        gsap.set(".scene-hero", { opacity: 1 });

        tl.from(".ambient-one", { scale: 0.92, x: 18, y: -16, duration: 4, ease: "sine.inOut", repeat: 3, yoyo: true }, 0);
        tl.from(".ambient-two", { scale: 0.94, x: -16, y: 22, duration: 4, ease: "sine.inOut", repeat: 3, yoyo: true }, 0);
        tl.to(".grid", { x: -80, y: -80, duration, ease: "none" }, 0);
        tl.from(".brand-footer", { y: 26, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.2);

        tl.from(".hero-image", { scale: 1.05, x: 22, opacity: 0, duration: 0.8, ease: "power3.out" }, 0.1);
        tl.to(".hero-image", { scale: 1.07, x: -18, y: -8, duration: 4.4, ease: "sine.inOut" }, 0.8);
        tl.fromTo(".spark-a", { opacity: 0, scale: 0.55 }, { opacity: 1, scale: 1.08, duration: 0.34, ease: "power2.out" }, 2.15);
        tl.to(".spark-a", { opacity: 0, scale: 1.55, duration: 0.45, ease: "power2.out" }, 2.45);
        tl.fromTo(".pop-one", { y: 26, scale: 0.76, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: 0.34, ease: "back.out(2)" }, 2.22);
        tl.to(".pop-one", { y: -18, opacity: 0, duration: 0.36, ease: "power2.in" }, 3.05);
        tl.fromTo(".spark-b", { opacity: 0, scale: 0.55 }, { opacity: 1, scale: 1.08, duration: 0.34, ease: "power2.out" }, 3.08);
        tl.to(".spark-b", { opacity: 0, scale: 1.55, duration: 0.45, ease: "power2.out" }, 3.38);
        tl.fromTo(".pop-two", { y: 28, scale: 0.74, opacity: 0 }, { y: 0, scale: 1, opacity: 1, duration: 0.34, ease: "back.out(2)" }, 3.15);
        tl.to(".pop-two", { y: -18, opacity: 0, duration: 0.36, ease: "power2.in" }, 4.1);
        tl.to(".scene-hero", { opacity: 0, scale: 1.02, duration: 0.55, ease: "power2.in" }, 5.0);

        tl.set(".scene-teams", { opacity: 1 }, 5.15);
        tl.from(".teams-image", { scale: 1.08, x: -32, opacity: 0, duration: 0.7, ease: "power3.out" }, 5.15);
        tl.to(".teams-image", { scale: 1.04, x: 18, duration: 4.2, ease: "sine.inOut" }, 5.8);
        tl.from(".caption-teams", { y: 36, opacity: 0, scale: 0.96, duration: 0.48, ease: "back.out(1.5)" }, 6.1);
        tl.to(".caption-teams", { y: -10, duration: 0.44, ease: "sine.inOut", repeat: 1, yoyo: true }, 7.2);
        tl.to(".scene-teams", { opacity: 0, scale: 1.02, duration: 0.55, ease: "power2.in" }, 9.6);

        tl.set(".scene-flow", { opacity: 1 }, 9.75);
        tl.from(".flow-image", { scale: 1.06, y: 24, opacity: 0, duration: 0.68, ease: "power3.out" }, 9.75);
        tl.to(".flow-image", { scale: 1.035, x: -16, duration: 4.8, ease: "sine.inOut" }, 10.2);
        tl.fromTo(".flow-label", { y: 22, opacity: 0 }, { y: 0, opacity: 1, duration: 0.38, ease: "power2.out" }, 10.6);
        tl.fromTo(".highlight-one", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.36, ease: "back.out(1.8)" }, 11.1);
        tl.to(".highlight-one", { opacity: 0, scale: 1.35, duration: 0.45, ease: "power2.out" }, 11.65);
        tl.fromTo(".highlight-two", { opacity: 0, scale: 0.7 }, { opacity: 1, scale: 1, duration: 0.36, ease: "back.out(1.8)" }, 12.05);
        tl.to(".highlight-two", { opacity: 0, scale: 1.35, duration: 0.45, ease: "power2.out" }, 12.6);
        tl.to(".scene-flow", { opacity: 0, scale: 1.02, duration: 0.5, ease: "power2.in" }, 13.25);

        tl.set(".scene-close", { opacity: 1 }, 13.35);
        tl.from(".close-panel", { y: 45, opacity: 0, scale: 0.97, duration: 0.58, ease: "power3.out" }, 13.45);
        tl.from(".close-panel .eyebrow", { y: 22, opacity: 0, duration: 0.34, ease: "power2.out" }, 13.72);
        tl.from(".close-panel h1", { y: 34, opacity: 0, duration: 0.48, ease: "power3.out" }, 13.92);
        tl.from(".close-panel p", { y: 24, opacity: 0, duration: 0.38, ease: "power2.out" }, 14.22);
        tl.from(".status-row span", { y: 24, opacity: 0, scale: 0.94, duration: 0.32, ease: "back.out(1.5)", stagger: 0.08 }, 14.55);

        window.__timelines["google-chat-ai-gateway-reply-demo"] = tl;

        if (!new URLSearchParams(window.location.search).has("capture")) {
          requestAnimationFrame(() => tl.play(0));
        }
      </script>
    </div>
  </body>
</html>
